limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

server {
    listen 80;
    server_name team-finder.ru www.team-finder.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name team-finder.ru www.team-finder.ru;
    ssl_certificate /etc/letsencrypt/live/team-finder.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/team-finder.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_ecdh_curve X25519:prime256v1;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 5m;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    server_tokens off;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log info;

    keepalive_timeout 75;
    client_max_body_size 5M;

    client_body_timeout 10s;
    client_header_timeout 10s;

    if ($host !~* ^(team-finder.ru|www.team-finder.ru)$ ) {
        return 444;
    }

    if ($http_user_agent ~* (AhrefsBot|SemrushBot|DotBot|MJ12bot|MauiBot|ZoominfoBot|PetalBot|Go-http-client|Java|Python-urllib|python-requests)) {
        return 403;
    }

    location ~* \.(php|aspx|jsp|cgi|env|git|yaml|yml|DS_Store|sql|bak|sh|bash|ini|log|conf|config|xml|toml|lock)$ {
        return 444;
    }

    location ~* ^/(dockerfile|dockerignore|makefile|readme|changelog|license)(\..*)?$ {
        return 444;
    }

    location ~* /\.(env|git|aws|ssh) {
        return 444;
    }

    location ~* /\.env[\.\-] {
        return 444;
    }

    location ~* /wp- {
        return 444;
    }

    location ~* /(wordpress|wp-admin|wp-login|wp-content|wp-includes) {
        return 444;
    }

    location ~* //.*wp- {
        return 444;
    }

    location = /robots.txt {
        add_header  Content-Type  text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location /static/ {
        access_log off;
        limit_req zone=mylimit burst=30 nodelay;
        alias /collected_static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        access_log off;
        limit_req zone=mylimit burst=30 nodelay;
        alias /media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        limit_req zone=mylimit burst=20 nodelay;
        proxy_pass http://django_app:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }
}
