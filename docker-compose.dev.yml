services:
  postgres:
    image: postgres:17.9-alpine3.23
    container_name: postgres_container
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "teamfinder"
    volumes:
      - pg_data:/var/lib/postgresql/data
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7.4.8-alpine3.21
    container_name: redis_container
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6379 ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  django_app:
    build: .
    container_name: django_app
    environment:
      TF__DJANGO__SECRET_KEY: "django-secret-key"
      TF__POSTGRES__HOST: "postgres"
      TF__POSTGRES__PASSWORD: "postgres"
      TF__REDIS__HOST: "redis"
    volumes:
      - static_volume:/app/collected_static/
      - media_volume:/app/media/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.29.7-alpine3.23-slim
    container_name: nginx_container
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/collected_static:ro
      - media_volume:/media:ro
    depends_on:
      django_app:
        condition: service_healthy
    restart: unless-stopped


volumes:
  pg_data:
  static_volume:
  media_volume:
  redis_data:
