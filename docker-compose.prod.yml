services:
  postgres:
    image: postgres:17.8-alpine3.23
    container_name: postgres_container
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${TF__POSTGRES__USER}
      POSTGRES_PASSWORD: ${TF__POSTGRES__PASSWORD}
      POSTGRES_DB: ${TF__POSTGRES__DB}
    networks:
      - postgres_network
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    command: >
              postgres 
              -c max_connections=20
              -c shared_buffers=128MB
              -c work_mem=4MB
              -c maintenance_work_mem=32MB
              -c effective_cache_size=384MB
              -c wal_buffers=4MB
              -c checkpoint_completion_target=0.9
              -c random_page_cost=1.1
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    tty: true
    stdin_open: true

  redis:
    image: redis:7-alpine
    container_name: redis_container
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${TF__REDIS__PASSWORD}
      - REDIS_PORT=${TF__REDIS__PORT}
    command: >
      redis-server 
        --requirepass ${TF__REDIS__PASSWORD} 
        --port ${TF__REDIS__PORT}
        --maxmemory 128mb
        --maxmemory-policy volatile-ttl
    networks:
      - redis_network
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p $$REDIS_PORT -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  django_app:
    image: warrior88888/team-finder-ad
    container_name: django_app
    env_file:
      - .env
    environment:
      TF__DJANGO__DEBUG: "False"
      TF__POSTGRES__HOST: "postgres"
      TF__REDIS__HOST: "redis"
      TF__TASK__VERSION: 1
    networks:
      - backend_network
      - redis_network
      - postgres_network
    volumes:
      - static_volume:/app/collected_static/
      - media_volume:/app/media/
      - /var/log/django:/var/log/django
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine3.23-slim
    container_name: nginx_container
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend_network
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/collected_static:ro
      - media_volume:/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      django_app:
        condition: service_healthy
    restart: unless-stopped

networks:
  backend_network:
    driver: bridge
  postgres_network:
    driver: bridge
    internal: true
  redis_network:
    driver: bridge
    internal: true

volumes:
  pg_data:
  static_volume:
  media_volume:
  redis_data:
